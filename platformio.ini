; ============================================================
;  ESP32-C3 Smartwatch + Navigation
;  Display : 1.54" TFT ST7789 240x240 SPI
;  UI      : LVGL 8.3 + TFT_eSPI
;  Build   : PlatformIO
; ============================================================
[env:esp32-c3-devkitm-1]
platform      = espressif32
board         = esp32-c3-devkitm-1
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

; LittleFS cho wallpaper + cau hinh
board_build.filesystem = littlefs
; App lon (BLE+WiFi+LVGL ~1.45MB) -> dung partition huge_app (3MB app, khong OTA)
board_build.partitions = huge_app.csv

lib_deps =
    lvgl/lvgl@^8.3.11
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.4
    h2zero/NimBLE-Arduino@^1.4.1

build_flags =
    ; ---- LVGL: tro toi lv_conf.h trong src/ ----
    -I src
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE

    ; ---- TFT_eSPI: cau hinh truc tiep qua build flag (khong dung User_Setup.h) ----
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_RGB_ORDER=TFT_RGB         ; doi sang TFT_BGR neu mau bi dao
    ; -- chan SPI (xem so do trong README) --
    -D TFT_MOSI=6
    -D TFT_SCLK=4
    -D TFT_CS=7
    -D TFT_DC=3
    -D TFT_RST=10
    -D TFT_BL=5
    -D TFT_BACKLIGHT_ON=HIGH
    ; -- font built-in cua TFT_eSPI (LVGL tu render font rieng) --
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    ; -- toc do SPI: ST7789 chay tot o 40-80MHz --
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000

    ; ---- App cua minh ----
    -D CORE_DEBUG_LEVEL=1
    -std=gnu++17

build_unflags =
    -std=gnu++11
